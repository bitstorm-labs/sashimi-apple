name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build tvOS App
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install tvOS Platform
        run: |
          # Check if tvOS SDK is already available
          if xcodebuild -showsdks | grep -q tvos; then
            echo "tvOS SDK already installed"
          else
            echo "Downloading tvOS platform..."
            for i in 1 2 3; do
              xcodebuild -downloadPlatform tvOS && break
              echo "Retry $i failed, waiting 10s..."
              sleep 10
            done
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies -project Sashimi.xcodeproj -scheme Sashimi

      - name: List Available Destinations
        run: xcodebuild -project Sashimi.xcodeproj -scheme Sashimi -showdestinations | head -30

      - name: Build for tvOS Simulator
        shell: bash # explicit bash enables pipefail so xcodebuild failures aren't masked by xcpretty
        run: |
          xcodebuild build \
            -project Sashimi.xcodeproj \
            -scheme Sashimi \
            -destination 'generic/platform=tvOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Build for tvOS Device (Release)
        shell: bash # explicit bash enables pipefail so xcodebuild failures aren't masked by xcpretty
        run: |
          xcodebuild build \
            -project Sashimi.xcodeproj \
            -scheme Sashimi \
            -sdk appletvos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Create tvOS Simulator
        # Runner images periodically drop preinstalled runtimes/devices; fetch
        # the runtime and create a device explicitly (download alone creates none).
        run: |
          sudo xcodebuild -downloadPlatform tvOS || xcodebuild -downloadPlatform tvOS
          RUNTIME=$(xcrun simctl list runtimes tvOS | grep -oE 'com.apple.CoreSimulator.SimRuntime.tvOS[-0-9]+' | tail -1)
          echo "Using runtime: $RUNTIME"
          xcrun simctl create "ci-atv" "Apple TV 4K (3rd generation)" "$RUNTIME"

      - name: Run Tests
        shell: bash # explicit bash enables pipefail so xcodebuild failures aren't masked by xcpretty
        run: |
          xcodebuild test \
            -project Sashimi.xcodeproj \
            -scheme Sashimi \
            -destination 'platform=tvOS Simulator,name=ci-atv' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

  build-ios:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies -project Sashimi.xcodeproj -scheme SashimiMobile

      - name: Build for iOS Simulator
        shell: bash # explicit bash enables pipefail so xcodebuild failures aren't masked by xcpretty
        run: |
          xcodebuild build \
            -project Sashimi.xcodeproj \
            -scheme SashimiMobile \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict --reporter github-actions-logging
